<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piper - AI Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.5.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-/bQdsTh/ZeC6Jw2WqkK6+K9YA/QD6A5F6L8Hj5PMqI5sU9djl8zWmXSaVJU1lPIT" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1><i class="fas fa-robot me-2"></i>Piper</h1>
        <p>AI Assistant for Business Intelligence</p>
      </div>

      <button id="new-chat" class="new-chat-btn">
        <i class="fas fa-plus me-2"></i>New Chat
      </button>

      <div class="chat-history" style="flex: 1; padding: 20px;">
        <h6 style="color: #6c757d; font-size: 0.9rem; margin-bottom: 10px;">Recent Chats</h6>
        <div id="chat-list" class="chat-list">
          <!-- Chat history will be populated here -->
        </div>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="main-chat">
      <div class="chat-header">
        <h2>Business Intelligence Assistant</h2>
      </div>

      <!-- Messages Container -->
      <div id="messages" class="messages">
        <!-- Welcome Message -->
        <div class="welcome-message">
          <h3><i class="fas fa-robot me-2"></i>Hello! I'm Piper</h3>
          <p>Your AI assistant for business intelligence and data analysis</p>
          <p class="welcome-time" id="welcome-time"></p>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div id="file-preview" class="file-preview d-none">
          <i class="fas fa-file-csv"></i>
          <span id="file-name"></span>
          <button id="remove-file" class="remove-file">
            <i class="fas fa-times"></i>
          </button>
        </div>

        <div class="input-container">
          <button id="attach-file" class="attach-file" title="Attach file">
            <i class="fas fa-paperclip"></i>
          </button>
          <textarea id="message-input" class="message-input" placeholder="Ask Piper anything..." rows="1"></textarea>
          <button id="send-btn" class="send-btn">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>

        <input type="file" id="file-input" accept=".csv,.xls,.xlsx" class="file-input" />
      </div>
    </div>
  </div>

  <!-- Loading Modal -->
  <div class="modal fade loading-modal" id="loading-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body text-center p-4">
          <div class="loading-spinner"></div>
          <h5>Analyzing...</h5>
          <p class="text-muted mb-0">Piper is processing your request</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.5.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDERU4rHvLhMKZL6FEM+V5GmD3fP" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
