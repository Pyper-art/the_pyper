<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piper - AI Assistant</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Marked.js for Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1><i class="fas fa-robot"></i> Piper</h1>
        <p>Business Intelligence</p>
      </div>

      <div class="sidebar-content">
        <button id="new-chat" class="new-chat-btn">
          <i class="fas fa-plus"></i> New Chat
        </button>

        <div class="chat-history">
          <h6>Recent Chats</h6>
          <div id="chat-list" class="chat-list">
            <!-- Chat history will be populated here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="main-chat">
      <div class="chat-header">
        <h2>Intelligence Assistant</h2>
      </div>

      <!-- Messages Container -->
      <div id="messages" class="messages">
        <!-- Welcome Message -->
        <div class="welcome-message">
          <div class="welcome-icon"><i class="fas fa-chart-pie"></i></div>
          <h3>Hello! I'm Piper</h3>
          <p>Your AI assistant for business intelligence and data analysis.</p>
          <p class="welcome-time" id="welcome-time"></p>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <div id="file-preview" class="file-preview hidden">
            <div class="file-preview-content">
              <i class="fas fa-file-csv"></i>
              <span id="file-name">Dataset.csv</span>
            </div>
            <button id="remove-file" class="remove-file">
              <i class="fas fa-times"></i>
            </button>
          </div>

          <div class="input-container">
            <button id="attach-file" class="action-btn" title="Attach dataset">
              <i class="fas fa-paperclip"></i>
            </button>
            <textarea id="message-input" class="message-input" placeholder="Ask Piper a question about your data..." rows="1"></textarea>
            <button id="send-btn" class="send-btn" title="Send message">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
        <p class="disclaimer">Piper is an AI agent. It uses Naimexi business rules to evaluate metrics.</p>
        <input type="file" id="file-input" accept=".csv,.xls,.xlsx" class="file-input" />
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
